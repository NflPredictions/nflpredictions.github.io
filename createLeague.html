<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Predictions || Create League</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <script type="module" src="redirect.js"></script>
    <div id="headerGreen" class="headerGreen">
      <span id="authGreen"></span>
    </div>
    <div id="headerRed" class="headerRed">
      <span id="authRed"></span>
    </div>
    <div class="mainDiv">
      <div class="header">
        <br>
        <h1 class="h1">NFL Predictions</h1>
        <button id="exit" class="exit">X</button>
      </div>
      <hr>
      <div class="scroll">
        <div class="container">
          <div class="section">
            <h2 class="h2">League Information</h2>
            <br>
            <input id="name" class="input" placeholder="League Name"></input>
            <input id="password" class="input" placeholder="League Password"></input>
            <input id="cash" class="input" placeholder="Starting Cash Per Player"></input>
            <button id="createLeague" class="buttonSpan">Create League</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="main.js"></script>
    <script type="module" src="createLeague.js"></script>
  </body>
</html>

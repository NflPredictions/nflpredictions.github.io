<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Predictions || Home</title>
    <style>
      :root {
        --backgroundColor: rgba(0, 125, 255, 0.05);
        --textColor: rgba(200, 200, 200, 1);
        --mainBorderColor: rgba(0, 125, 255, 0.3);
        --borderColor: rgba(0, 125, 255, 0.5);
        --graphLineColor: rgba(0, 125, 255, 0.2);
        --graphPathColor: rgba(0, 125, 255, 1);
        --fontFamily: "Roboto", sans-serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-image: linear-gradient(to bottom right, rgb(0, 20, 50), rgb(0, 5, 10));
        background-attachment: fixed;
      }
      body {
        font-family: var(--fontFamily);
        background-image: linear-gradient(to bottom right, rgb(0, 20, 50), rgb(0, 5, 10));
        color: var(--textColor);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 10px;
        box-sizing: border-box;
      }
      .mainDiv {
        background-color: var(--backgroundColor);
        border: 2px solid var(--mainBorderColor);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 700px;
        max-height: 95vh;
        overflow: hidden;
      }
      .h1 {
        color: var(--textColor);
        font-size: clamp(1.5rem, 8vw, 2.5rem);
        margin: 20px;
        text-align: center;
      }
      .scroll {
        width: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-grow: 1;
      }
      .graph-container {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
      }
      .graph {
        background-color: var(--backgroundColor);
        border: 1px solid var(--borderColor);
        width: 100%;
        height: auto;
        display: block;
      }
      .align {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 20px 10px;
        width: 90%;
      }
      .button {
        outline: none;
        background-color: var(--backgroundColor);
        border: 1px solid var(--borderColor);
        border-radius: 5px;
        padding: 8px 15px;
        color: var(--textColor);
        font-size: 1rem;
        cursor: pointer;
        flex: 1;
        min-width: 80px;
        text-align: center;
      }
      hr {
        border: 0;
        width: 100%;
        height: 2px;
        background-color: var(--mainBorderColor);
        margin: 0;
      }
      .graphLine { 
        fill: none; 
        stroke: var(--graphLineColor); 
        stroke-width: 1.75px; 
      }
      .graphAxis { 
        fill: none; 
        stroke: var(--borderColor); 
        stroke-width: 1.75px;
      }
      .graphPath {
        fill: none; 
        stroke: var(--graphPathColor); 
        stroke-width: 1.75px; 
      }
      .graphText { 
        font-family: var(--fontFamily); 
        font-size: 12px;
        fill: var(--graphPathColor); 
      }
    </style>
  </head>
  <body>
    <div class="mainDiv">
      <h1 class="h1">NFL Predictions</h1>
      <hr>
      <div class="scroll">
        <div class="graph-container">
          <svg class="graph" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet">
            <line class="graphLine" x1="50" y1="50" x2="575" y2="50"></line>
            <line class="graphLine" x1="50" y1="100" x2="575" y2="100"></line>
            <line class="graphLine" x1="50" y1="150" x2="575" y2="150"></line>
            <line class="graphLine" x1="50" y1="200" x2="575" y2="200" style="stroke: var(--borderColor)"></line>
            <line class="graphLine" x1="50" y1="250" x2="575" y2="250"></line>
            <line class="graphLine" x1="50" y1="300" x2="575" y2="300"></line>
            <line class="graphLine" x1="50" y1="350" x2="575" y2="350"></line>
            <text class="graphText" x="10" y="55">N/A</text>
            <text class="graphText" x="10" y="105">N/A</text>
            <text class="graphText" x="10" y="155">N/A</text>
            <text class="graphText" x="10" y="205">0</text>
            <text class="graphText" x="10" y="255">N/A</text>
            <text class="graphText" x="10" y="305">N/A</text>
            <text class="graphText" x="10" y="355">N/A</text>
            <path class="graphPath" d="M 50, 200 L 100, 150"></path>
          </svg>
        </div>
      </div>
      <hr>
      <div class="align">
        <button class="button">Home</button>
        <button class="button">Betting</button>
        <button class="button">Loans</button>
        <button class="button">League</button>
      </div>
    </div>
  </body>
</html>

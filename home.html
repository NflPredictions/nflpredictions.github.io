<!DOCTYPE html>
<html lang="en">
  <head>
    <title>NFL Predictions || Home</title>
    <style>
      html {
        background-image: linear-gradient(to top right, rgb(0, 20, 50), rgb(0, 5, 10));
      }
      body {
        font-family: "Roboto", sans-serif;
        background-image: linear-gradient(to bottom right, rgb(0, 20, 50), rgb(0, 5, 10));
        color: rgba(200, 200, 200, 1);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
        margin: 0px;
        height: 100vh;
        font-size: 1rem;
      }
      .mainDiv {
        background-color: rgba(0, 125, 255, 0.05);
        border: 2px solid rgba(0, 125, 255, 0.3);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
        margin: 0px;
        max-width: 95%;
      }
      .h1 {
        color: rgba(200, 200, 200, 1);
        font-size: 2.5rem;
        padding: 0px;
        margin: 10px 40px;
        margin-bottom: 0px;
      }
      .logIn {
        outline: none;
        background-color: rgba(0, 125, 255, 0.05);
        border: 1px solid rgba(0, 125, 255, 0.5);
        border-radius: 5px;
        margin: 5px 40px;
        padding: 5px 10px;
        font-size: 1rem;
        color: rgba(200, 200, 200, 1);
        width: 200px;
      }
      .logIn:focus {
        background-color: rgba(0, 125, 255, 0.3);
      }
      .button {
        outline: none;
        background-color: rgba(0, 125, 255, 0.05);
        border: 1px solid rgba(0, 125, 255, 0.5);
        border-radius: 5px;
        margin: 0px;
        padding: 5px 10px;
        color: rgba(200, 200, 200, 1);
        font-size: 1rem;
      }
      .align {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        margin-bottom: 20px;
        max-width: 95%;
      }
      hr {
        border: 1px solid rgba(0, 125, 255, 0.3);
        width: 90%;
        height: 0px;
      }
    </style>
  </head>
  <body>
    <div class="mainDiv">
      <h1 class="h1">NFL Predictions</h1>
      <hr>
      <div class="align" style="width: 90%;">
        <button class="button">Home</button>
        <button class="button">Betting</button>
        <button class="button">Loans</button>
        <button class="button">League</button>
      </div>
    </div>
  </body>
</html>

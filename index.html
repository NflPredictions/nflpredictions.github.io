<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Nfl Predictions || Login</title>
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background-image: linear-gradient(to bottom right, rgb(0, 20, 50), rgb(0, 5, 10));
        color: rgba(200, 200, 200, 1);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
        margin: 0px;
        height: 100vh
      }
      .mainDiv {
        background-color: rgba(0, 125, 255, 0.05);
        border: 2px solid rgba(0, 125, 255, 0.3);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
        margin: 0px;
      }
      .h1 {
        color: rgba(200, 200, 200, 1);
        font-size: 25px;
        padding: 0px;
        margin: 10px 20px;
      }
      input {
        outline: none;
        background-color: rgba(0, 125, 255, 0.05);
        border: 1px solid rgba(0, 125, 255, 0.5);
        border-radius: 5px;
        margin: 10px 40px;
        padding: 5px 10px;
        font-size: 16px;
        color: rgba(200, 200, 200, 1);
      }
      input:focus {
        background-color: rgba(0, 125, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="mainDiv">
      <h1 class="h1">Nfl Predictions</h1>
      <input type="text" placeholder="Username"></input>
    </div>
  </body>
</html>

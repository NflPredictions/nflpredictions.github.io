<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Predictions || Home</title>
    <style>
      :root {
        --backgroundColor: rgba(0, 125, 255, 0.05);
        --textColor: rgba(200, 200, 200, 1);
        --mainBorderColor: rgba(0, 125, 255, 0.3);
        --borderColor: rgba(0, 125, 255, 0.5);
        --graphLineColor: rgba(0, 125, 255, 0.2);
        --graphPathColor: rgba(0, 125, 255, 1);
        --fontFamily: "Roboto", sans-serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: rgb(0, 15, 45);
      }
      body {
        font-family: "Roboto", sans-serif;
        color: var(--textColor);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
        margin: 0px;
        height: 100vh;
        font-size: 1rem;
      }
      .mainDiv {
        background-color: var(--backgroundColor);
        border: 2px solid var(--mainBorderColor);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
        margin: 0px;
        max-width: 95%;
      }
      .h1 {
        color: var(--textColor);
        font-size: 2.5rem;
        padding: 0px;
        margin: 10px 40px;
        margin-bottom: 0px;
      }
      .logIn {
        outline: none;
        background-color: var(--backgroundColor);
        border: 1px solid var(--borderColor);
        border-radius: 5px;
        margin: 5px 40px;
        padding: 5px 10px;
        font-size: 1rem;
        color: var(--textColor);
        width: 200px;
      }
      .logIn:focus {
        background-color: var(--backgroundColor);
      }
      .button {
        outline: none;
        background-color: var(--backgroundColor);
        border: 1px solid var(--borderColor);
        border-radius: 5px;
        margin: 0px;
        padding: 5px 10px;
        color: var(--textColor);
        font-size: 1rem;
      }
      .align {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        margin-bottom: 20px;
        max-width: 95%;
      }
    </style>
  </head>
  <body>
    <div class="mainDiv">
      <h1 class="h1">Nfl Predictions</h1>
      <input  class="logIn" type="text" placeholder="Username"></input>
      <input class="logIn" type="password" placeholder="password"></input><br>
      <div class="align" style="width: 220px;">
        <button class="button">Sign Up</button>
        <button class="button">Sign In</button>
      </div>
    </div>
  </body>
</html>

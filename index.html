<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Predictions || Home</title>
    <style>
      :root {
        --backgroundColor: rgba(0, 125, 255, 0.05);
        --textColor: rgba(200, 200, 200, 1);
        --mainBorderColor: rgba(0, 125, 255, 0.3);
        --borderColor: rgba(0, 125, 255, 0.5);
        --fontFamily: "Roboto", sans-serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: rgb(0, 15, 45);
      }
      body {
        font-family: var(--fontFamily);
        color: var(--textColor);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .mainDiv {
        background-color: var(--backgroundColor);
        border: 2px solid var(--mainBorderColor);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 20px;
        width: 100%;
        max-width: 400px;
      }
      .h1 {
        color: var(--textColor);
        font-size: clamp(1.8rem, 8vw, 2.5rem);
        margin: 0 0 20px 0;
        text-align: center;
      }
      .logIn {
        outline: none;
        background-color: var(--backgroundColor);
        border: 1px solid var(--borderColor);
        border-radius: 5px;
        margin: 0 0 20px 0;
        padding: clamp(8px, 3vw, 12px);
        font-size: 1rem;
        color: var(--textColor);
        width: 100%;
        box-sizing: border-box;
      }
      .logIn:focus {
        border-color: var(--graphPathColor);
        background-color: rgba(0, 125, 255, 0.1);
      }
      .align {
        display: flex;
        gap: 15px;
        margin: 0;
        width: 100%;
      }
      .button {
        flex: 1;
        outline: none;
        background-color: var(--backgroundColor);
        border: 1px solid var(--borderColor);
        border-radius: 5px;
        padding: clamp(8px, 3vw, 12px);
        color: var(--textColor);
        font-size: 1rem;
        cursor: pointer;
        transition: 0.2s;
      }
      .button:hover {
        background-color: var(--borderColor);
      }
    </style>
  </head>
  <body>
    <div class="mainDiv">
      <h1 class="h1">NFL Predictions</h1>
      <input class="logIn" type="text" placeholder="Username">
      <input class="logIn" type="password" placeholder="Password">
      <div class="align">
        <button class="button">Sign Up</button>
        <button class="button">Sign In</button>
      </div>
    </div>
  </body>
</html>

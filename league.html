<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Predictions || Loans</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="mainDiv">
      <h1 class="h1">NFL Predictions</h1>
      <hr>
      <div class="scroll">
        <div class="container">
          <div class="section">
            <h2 class="h2">Leaderboard</h2>
            <div class="section">
              <span>No data</span>
            </div>
          </div>
        </div>
        <hr class="gap">
        <div class="container">
          <div class="section">
            <h2 class="h2">Loans</h2>
            <div class="section">
              <span>No active loans</span>
            </div>
          </div>
        </div>
        <hr class="gap">
        <div class="container">
          <div class="section">
            <h2 class="h2">Proposed Loans</h2>
            <div class="section">
              <span>No proposed loans</span>
            </div>
            <hr class="gap">
            <button class="buttonSpan">Propose Loans</button>
          </div>
        </div>
      </div>
      <hr>
      <div class="align">
        <button class="button">Home</button>
        <button class="button">Betting</button>
        <button class="button">Loans</button>
        <button class="button buttonActive">League</button>
      </div>
    </div>
    <script src="main.js"></script>
    <script src="loans.js"></script>
  </body>
</html>

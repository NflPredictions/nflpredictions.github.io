<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Predictions || Betting</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="mainDiv">
      <div class="header">
        <br>
        <h1 class="h1">NFL Predictions</h1>
        <button id="exit" class="exit">X</button>
      </div>
      <hr>
      <div class="scroll">
        <div class="container">
          <div class="section">
            <h2 class="h2">Search</h2>
            <div class="section">
              <div class="inputDiv">
                <input id="search" class="input"></input>
                <button id="inputClear" class="inputClear">X</button>
              </div>
              <div class="section">
                <span>No bets matched search</span>
              </div>
            </div>
          </div>
        </div>
        <hr class="gap">
        <div class="container">
          <div class="section">
            <h2 class="h2">Active Bets</h2>
            <div class="section">
              <span>No active bets</span>
            </div>
          </div>
        </div>
      </div>
      <hr>
      <div class="align">
        <button id="home" class="button">Home</button>
        <button id="betting" class="button buttonActive">Betting</button>
        <button id="loans" class="button">Loans</button>
        <button id="league" class="button">League</button>
      </div>
    </div>
    <script type="module" src="main.js"></script>
    <script type="module" src="betting.js"></script>
  </body>
</html>
